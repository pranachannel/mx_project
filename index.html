<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectMX Dashboard (Static Version)</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f0f2f6; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header-controls { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        input[type="text"], input[type="date"] { padding: 8px; border: 1px solid #ccc; border-radius: 5px; }
        
        /* 데이터 테이블 스타일 */
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; cursor: pointer; }
        th:hover { background-color: #e2e6ea; }
        
        .btn-graph { background-color: #ff4b4b; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; }
        .btn-graph:hover { background-color: #ff3333; }
        .star-checkbox { cursor: pointer; transform: scale(1.5); }

        /* 모달 팝업 스타일 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: white; margin: 5% auto; padding: 20px; border-radius: 10px; width: 80%; max-width: 800px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .close-btn { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close-btn:hover { color: black; }
        #chart-container { width: 100%; height: 400px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 ProjectMX Dashboard</h2>
    
    <div class="header-controls">
        <div>
            <label>날짜 선택: </label>
            <input type="date" id="date-picker" value="2026-06-06"> 
        </div>
        <div>
            <input type="text" id="search-input" placeholder="닉네임 또는 ID 검색...">
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>북마크</th>
                <th>닉네임</th>
                <th>ID (IP)</th>
                <th>계정타입</th>
                <th>상세 분석</th>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
    </table>
</div>

<div id="graph-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h3 id="modal-title">유저 상세 그래프</h3>
        <div id="chart-container"></div>
    </div>
</div>

<script>
    // 1. 샘플 데이터 (실제로는 R2에서 fetch('https://도메인/2026/06/06/data.json') 으로 가져옴)
    const mockData = [
        { nickname: "유저A", id: "123.45.xx", type: "일반", history: [10, 25, 15, 40, 30] },
        { nickname: "유저B", id: "67.89.xx", type: "프리미엄", history: [5, 10, 8, 15, 12] },
        { nickname: "유저C", id: "211.33.xx", type: "일반", history: [50, 45, 60, 55, 70] }
    ];

    // 2. 브라우저 localStorage에서 북마크 불러오기 (Streamlit의 cookie_manager 대체)
    let bookmarks = JSON.parse(localStorage.getItem('user_bookmarks')) || [];

    // 3. 테이블 렌더링 함수
    function renderTable(data) {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = ''; // 초기화

        data.forEach(row => {
            const isBookmarked = bookmarks.includes(row.id);
            const tr = document.createElement('tr');
            
            tr.innerHTML = `
                <td>
                    <input type="checkbox" class="star-checkbox" 
                           ${isBookmarked ? 'checked' : ''} 
                           onchange="toggleBookmark('${row.id}')">
                </td>
                <td>${row.nickname}</td>
                <td>${row.id}</td>
                <td>${row.type}</td>
                <td><button class="btn-graph" onclick="openModal('${row.nickname}', '${row.id}')">그래프 보기</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 4. 북마크 토글 기능 (체크/해제 시 브라우저에 영구 저장)
    function toggleBookmark(id) {
        if (bookmarks.includes(id)) {
            bookmarks = bookmarks.filter(b => b !== id); // 제거
        } else {
            bookmarks.push(id); // 추가
        }
        localStorage.setItem('user_bookmarks', JSON.stringify(bookmarks));
        // 실제로는 여기서 테이블을 정렬하여 북마크된 유저를 최상단으로 올리는 로직을 추가할 수 있습니다.
    }

    // 5. 검색 기능
    document.getElementById('search-input').addEventListener('input', function(e) {
        const keyword = e.target.value.toLowerCase();
        const filtered = mockData.filter(row => 
            row.nickname.toLowerCase().includes(keyword) || 
            row.id.toLowerCase().includes(keyword)
        );
        renderTable(filtered);
    });

    // 6. 모달 & ECharts 그래프 기능 (Streamlit @st.dialog 대체)
    let myChart = null;

    function openModal(nickname, id) {
        document.getElementById('graph-modal').style.display = "block";
        document.getElementById('modal-title').innerText = `${nickname} (${id}) 활동 상세 그래프`;
        
        // 해당 유저의 데이터 찾기
        const userData = mockData.find(u => u.id === id);

        // 차트 초기화 및 렌더링
        if (myChart != null) { myChart.dispose(); } // 기존 차트 파기
        myChart = echarts.init(document.getElementById('chart-container'));

        const option = {
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'category', data: ['00시', '06시', '12시', '18시', '24시'] },
            yAxis: { type: 'value' },
            series: [{
                data: userData.history,
                type: 'line',
                smooth: true,
                areaStyle: { opacity: 0.2 },
                itemStyle: { color: '#ff4b4b' }
            }]
        };
        myChart.setOption(option);
    }

    function closeModal() {
        document.getElementById('graph-modal').style.display = "none";
    }

    // 초기 화면 렌더링
    renderTable(mockData);
</script>

</body>
</html>
