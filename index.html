<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectMX Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        :root { --primary-color: #333; --bg-color: #f0f2f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: var(--bg-color); color: #31333f; }
        
        /* 레이아웃 */
        .main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .st-card { background: white; padding: 1.5rem; border-radius: 0.5rem; box-shadow: rgba(0, 0, 0, 0.05) 0px 1px 2px 0px; margin-bottom: 1rem; }
        
        /* 상단 헤더 & 필터 */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .filters { display: flex; gap: 10px; align-items: center; }
        input[type="date"], input[type="number"], input[type="text"], select { 
            padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none;
        }

        /* Streamlit 스타일 탭 메뉴 */
        .tab-container { display: flex; gap: 5px; margin-bottom: 1.5rem; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .tab { 
            padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: 500; color: #555;
            transition: all 0.2s;
        }
        .tab:hover { background: #eee; }
        .tab.active { background: var(--primary-color); color: white; font-weight: bold; }

        /* 섹션 제어 */
        .content-section { display: none; }
        .content-section.active { display: block; }

        /* 메트릭 카드 (상단 지표) */
        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 1.5rem; }
        .metric-item { background: white; padding: 1rem; border-radius: 8px; border: 1px solid #eee; text-align: left; }
        .metric-label { font-size: 0.9rem; color: #666; }
        .metric-value { font-size: 1.8rem; font-weight: bold; margin-top: 5px; }

        /* 테이블 스타일 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #fafafa; font-size: 0.85rem; color: #666; cursor: pointer; }
        .star-checkbox { transform: scale(1.3); cursor: pointer; }
        .badge { padding: 3px 7px; border-radius: 4px; font-size: 11px; font-weight: bold; color: white; }
        .bg-gonic { background: #17a2b8; } .bg-ban { background: #6c757d; } .bg-udong { background: #dc3545; }

        /* 모달 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 5% auto; padding: 25px; border-radius: 10px; width: 90%; max-width: 700px; }
        #chart-container { width: 100%; height: 350px; }

        .btn-search { background: var(--primary-color); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .status-msg { font-size: 0.85rem; margin-bottom: 1rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="main">
    <div class="header">
        <h1 style="margin:0; font-size: 1.8rem;">프로젝트MX 대시보드</h1>
        <div class="filters">
            <input type="date" id="date-picker"> 
            <input type="number" id="hour-picker" min="0" max="23" placeholder="시" style="width: 60px;">
            <button class="btn-search" onclick="fetchData('specific')">조회</button>
        </div>
    </div>

    <div class="tab-container">
        <div class="tab active" onclick="switchTab('trends', this)">📈 시간대 그래프</div>
        <div class="tab" onclick="switchTab('ranking', this)">🏆 유저 랭킹</div>
        <div class="tab" onclick="switchTab('search', this)">🔍 유저 검색</div>
    </div>

    <div id="status-text" class="status-msg">데이터 로딩 중...</div>

    <div id="section-trends" class="content-section active">
        <div class="metrics-grid">
            <div class="metric-item"><div class="metric-label">📝 총 게시글</div><div id="m-posts" class="metric-value">0</div></div>
            <div class="metric-item"><div class="metric-label">💬 총 댓글</div><div id="m-comments" class="metric-value">0</div></div>
            <div class="metric-item"><div class="metric-label">👥 액티브 유저</div><div id="m-users" class="metric-value">0</div></div>
        </div>
        <div class="st-card">
            <h3 style="margin-top:0;">시간대 활동 분포</h3>
            <div id="main-trend-chart" style="width: 100%; height: 400px;"></div>
        </div>
    </div>

    <div id="section-ranking" class="content-section">
        <div class="st-card">
            <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px;">
                <h3 style="margin:0;">🏆 Top 50 랭킹</h3>
                <div style="display:flex; gap:10px; align-items:center;">
                    <label style="font-size:13px;">정렬:</label>
                    <select id="sort-select" onchange="sortAndRender()">
                        <option value="total">총활동수</option>
                        <option value="post">게시글순</option>
                        <option value="comment">댓글순</option>
                    </select>
                    <label style="font-size:13px; margin-left:10px;">⭐ 즐겨찾기만:</label>
                    <input type="checkbox" id="filter-bookmark" onchange="sortAndRender()">
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th style="width:50px;">⭐</th>
                        <th>닉네임</th>
                        <th>ID (IP)</th>
                        <th>타입</th>
                        <th>글</th>
                        <th>댓글</th>
                        <th>총합</th>
                        <th>분석</th>
                    </tr>
                </thead>
                <tbody id="ranking-body"></tbody>
            </table>
        </div>
    </div>

    <div id="section-search" class="content-section">
        <div class="st-card">
            <div style="margin-bottom: 20px;">
                <input type="text" id="search-input" placeholder="검색할 닉네임 또는 ID 입력..." style="width: 100%; box-sizing: border-box;">
            </div>
            <table>
                <thead>
                    <tr>
                        <th style="width:50px;">⭐</th>
                        <th>닉네임</th>
                        <th>ID (IP)</th>
                        <th>타입</th>
                        <th>글</th>
                        <th>댓글</th>
                        <th>총합</th>
                        <th>분석</th>
                    </tr>
                </thead>
                <tbody id="search-body"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="graph-modal" class="modal">
    <div class="modal-content">
        <span style="cursor:pointer; float:right; font-size:24px;" onclick="closeModal()">&times;</span>
        <h3 id="modal-title" style="margin-top:0;">유저 활동 분석</h3>
        <div id="chart-container"></div>
    </div>
</div>

<script>
    // 💡 R2 주소 설정
    const R2_DOMAIN = "https://pub-fca2435a027e41bf954b4bc4f46e560a.r2.dev"; 

    let currentData = [];
    let bookmarks = JSON.parse(localStorage.getItem('user_bookmarks')) || [];
    let activeTab = 'trends';

    // 초기 날짜 설정
    const todayKst = new Date(new Date().getTime() + (9 * 60 * 60 * 1000)).toISOString().split('T')[0];
    document.getElementById('date-picker').value = todayKst;

    // 탭 전환
    function switchTab(tabId, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        
        el.classList.add('active');
        document.getElementById(`section-${tabId}`).classList.add('active');
        activeTab = tabId;
        
        if (tabId === 'trends') renderTrendChart();
    }

    // 데이터 가져오기
    async function fetchData(mode) {
        const statusText = document.getElementById('status-text');
        const dateVal = document.getElementById('date-picker').value;
        let hourVal = document.getElementById('hour-picker').value;
        let targetUrl = (mode === 'latest') ? `${R2_DOMAIN}/latest_data.json` : `${R2_DOMAIN}/${dateVal}/${hourVal.padStart(2, '0')}h.json`;

        statusText.innerText = "⏳ 데이터를 불러오는 중...";
        try {
            const response = await fetch(targetUrl, { cache: "no-store" });
            if (!response.ok) throw new Error();
            currentData = await response.json();
            
            updateMetrics();
            sortAndRender();
            if (activeTab === 'trends') renderTrendChart();

            statusText.innerText = `✅ 성공: ${currentData.length}명의 데이터를 표시합니다.`;
            statusText.style.color = "green";
        } catch (e) {
            statusText.innerText = "❌ 해당 시간의 데이터를 찾을 수 없습니다.";
            statusText.style.color = "red";
        }
    }

    // 상단 지표 업데이트
    function updateMetrics() {
        const posts = currentData.reduce((sum, r) => sum + r.post, 0);
        const comments = currentData.reduce((sum, r) => sum + r.comment, 0);
        document.getElementById('m-posts').innerText = posts.toLocaleString();
        document.getElementById('m-comments').innerText = comments.toLocaleString();
        document.getElementById('m-users').innerText = currentData.length.toLocaleString();
    }

    // 정렬 및 렌더링
    function sortAndRender() {
        const sortKey = document.getElementById('sort-select').value;
        const onlyBookmark = document.getElementById('filter-bookmark').checked;
        
        let displayData = [...currentData];
        if (onlyBookmark) displayData = displayData.filter(r => bookmarks.includes(r.id));
        
        displayData.sort((a, b) => b[sortKey] - a[sortKey]);
        
        renderTable('ranking-body', displayData.slice(0, 50));
        renderTable('search-body', currentData); // 검색탭은 전체 데이터 기준
    }

    function renderTable(targetId, data) {
        const tbody = document.getElementById(targetId);
        tbody.innerHTML = '';
        data.forEach(row => {
            const isBookmarked = bookmarks.includes(row.id);
            const tr = document.createElement('tr');
            if (isBookmarked) tr.style.background = "#fffacd";
            
            let bType = (row.type === "고닉") ? "bg-gonic" : (row.type === "반고닉" ? "bg-ban" : "bg-udong");
            
            tr.innerHTML = `
                <td><input type="checkbox" class="star-checkbox" ${isBookmarked ? 'checked' : ''} onchange="toggleBookmark('${row.id}')"></td>
                <td><b>${row.nickname}</b></td>
                <td>${row.id}</td>
                <td><span class="badge ${bType}">${row.type}</span></td>
                <td>${row.post}</td>
                <td>${row.comment}</td>
                <td style="color:#ff4b4b; font-weight:bold;">${row.total}</td>
                <td><button class="btn-graph" onclick="openModal('${row.nickname}', '${row.id}')">분석</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 시간대 그래프 (섹션 1)
    // 시간대 그래프 (섹션 1)
    function renderTrendChart() {
        const chartDom = document.getElementById('main-trend-chart');
        const myChart = echarts.init(chartDom);
        
        // 총 활동량 기준 상위 20명을 추출 (그래프가 너무 조밀해지는 것을 방지)
        const topUsers = [...currentData].sort((a, b) => b.total - a.total).slice(0, 20);
        
        // X축(닉네임)과 Y축(글, 댓글) 데이터 분리
        const nicknames = topUsers.map(u => u.nickname);
        const posts = topUsers.map(u => u.post);
        const comments = topUsers.map(u => u.comment);

        const option = {
            tooltip: { 
                trigger: 'axis' 
            },
            legend: { 
                data: ['게시글 수', '댓글 수'],
                top: '0%'
            },
            grid: {
                left: '3%',
                right: '4%',
                bottom: '5%',
                containLabel: true
            },
            xAxis: { 
                type: 'category', 
                boundaryGap: false, // 선 그래프가 양쪽 끝에 딱 붙어서 시작하도록 설정
                data: nicknames,
                axisLabel: {
                    interval: 0, // 모든 닉네임을 생략 없이 표시
                    rotate: 45,  // 닉네임이 길어 겹치는 것을 방지하기 위해 45도 기울임
                    fontSize: 11
                }
            },
            yAxis: { 
                type: 'value' 
            },
            series: [
                {
                    name: '게시글 수',
                    type: 'line',
                    data: posts,
                    smooth: true, // 선을 꺾은선 대신 부드러운 곡선으로 처리
                    itemStyle: { color: '#007bff' },
                    areaStyle: { opacity: 0.1 } // 선 아래쪽에 옅은 색을 채워 가시성 향상
                },
                {
                    name: '댓글 수',
                    type: 'line',
                    data: comments,
                    smooth: true,
                    itemStyle: { color: '#ff4b4b' },
                    areaStyle: { opacity: 0.1 }
                }
            ]
        };
        myChart.setOption(option);
    }

    // 상세 분석 모달
    let modalChart = null;
    function openModal(nick, id) {
        document.getElementById('graph-modal').style.display = "block";
        const user = currentData.find(u => u.id === id);
        if (modalChart) modalChart.dispose();
        modalChart = echarts.init(document.getElementById('chart-container'));
        modalChart.setOption({
            series: [{
                type: 'pie', radius: '70%',
                data: [{value: user.post, name: '글'}, {value: user.comment, name: '댓글'}],
                label: { formatter: '{b}: {c}회 ({d}%)' }
            }]
        });
    }

    function toggleBookmark(id) {
        bookmarks = bookmarks.includes(id) ? bookmarks.filter(b => b !== id) : [...bookmarks, id];
        localStorage.setItem('user_bookmarks', JSON.stringify(bookmarks));
        sortAndRender();
    }

    // 검색창 실시간 필터
    document.getElementById('search-input').addEventListener('input', (e) => {
        const kw = e.target.value.toLowerCase();
        const filtered = currentData.filter(r => r.nickname.toLowerCase().includes(kw) || r.id.includes(kw));
        renderTable('search-body', filtered);
    });

    function closeModal() { document.getElementById('graph-modal').style.display = "none"; }
    window.onload = () => fetchData('latest');
</script>

</body>
</html>
