<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectMX Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/ko.js"></script>

    <style>
        :root { --primary-color: #333; --bg-color: #f0f2f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: var(--bg-color); color: #31333f; }
        
        .main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .st-card { background: white; padding: 1.5rem; border-radius: 0.5rem; box-shadow: rgba(0, 0, 0, 0.05) 0px 1px 2px 0px; margin-bottom: 1rem; overflow: hidden; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .filters { display: flex; gap: 10px; align-items: center; }
        
        input[type="text"].date-picker-box { 
            padding: 10px 15px; border: 2px solid #ddd; border-radius: 8px; outline: none;
            cursor: pointer; font-size: 15px; font-weight: bold; text-align: center;
            background-color: white; transition: border-color 0.2s; width: 140px;
        }
        input[type="text"].date-picker-box:hover { border-color: #888; }
        input[type="text"] { padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none; }

        .tab-container { display: flex; gap: 5px; margin-bottom: 1.5rem; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .tab { padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: 500; color: #555; transition: all 0.2s; }
        .tab:hover { background: #eee; }
        .tab.active { background: var(--primary-color); color: white; font-weight: bold; }

        .content-section { display: none; }
        .content-section.active { display: block; }

        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 1.5rem; }
        .metric-item { background: white; padding: 1rem; border-radius: 8px; border: 1px solid #eee; text-align: left; }
        .metric-label { font-size: 0.9rem; color: #666; font-weight: bold; }
        .metric-value { font-size: 1.8rem; font-weight: bold; margin-top: 5px; color: #007bff; }

        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; min-width: 750px; }
        td, th { padding: 12px; border-bottom: 1px solid #eee; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        th { background: #fafafa; font-size: 0.85rem; color: #666; user-select: none; transition: background 0.2s; }
        th.sortable { cursor: pointer; }
        th.sortable:hover { background: #e2e6ea; }
        th span[id^="sort-"] { display: inline-block; width: 1.5em; text-align: center; color: #888; }
        
        table tbody tr { cursor: pointer; transition: background 0.1s; }
        table tbody tr:hover { background-color: #f8f9fa !important; }
        
        .td-bookmark { cursor: pointer; text-align: center; transition: background 0.1s; }
        .td-bookmark:hover { background-color: #e2e6ea !important; }
        .star-checkbox { transform: scale(1.3); pointer-events: none; }
        
        .badge { padding: 3px 7px; border-radius: 4px; font-size: 11px; font-weight: bold; color: white; }
        .bg-gonic { background: #17a2b8; } .bg-ban { background: #6c757d; } .bg-udong { background: #dc3545; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 5% auto; padding: 25px; border-radius: 10px; width: 90%; max-width: 700px; }
        #chart-container { width: 100%; height: 350px; }

        .btn-search { background: var(--primary-color); color: white; border: 1px solid var(--primary-color); padding: 10px 40px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-search:hover { background: #000; }
        
        .btn-star-filter { background: white; border: 1px solid #ddd; padding: 9px 15px; border-radius: 5px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .btn-star-filter:hover { border-color: #aaa; background: #fafafa; }
        .btn-star-filter.active { background: #fffacd; border-color: #ffda44; font-weight: bold; }

        .btn-rank { background: white; border: 1px solid #ddd; padding: 7px 15px; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: bold; color: #666; transition: all 0.2s; }
        .btn-rank:hover { background: #eee; }
        .btn-rank.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }

        .btn-type { background: white; border: 1px solid #ddd; padding: 9px 12px; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: bold; color: #888; transition: all 0.2s; }
        .btn-type.active.gonic { background: #17a2b8; color: white; border-color: #17a2b8; }
        .btn-type.active.ban { background: #6c757d; color: white; border-color: #6c757d; }
        .btn-type.active.udong { background: #dc3545; color: white; border-color: #dc3545; }

        .status-msg { font-size: 0.85rem; margin-bottom: 1rem; font-weight: bold; }
        .rank-number { font-weight: bold; color: #666; font-size: 14px; text-align: center; }
        
        /* 💡 높이 고정용 투명 컨테이너 (필터바와 동일한 높이 50px 확보) */
        .filter-placeholder { height: 50px; }
    </style>
</head>
<body>

<div class="main">
    <div class="header">
        <h1 style="margin:0; font-size: 1.8rem;">프로젝트MX 대시보드</h1>
        <div class="filters">
            <input type="text" id="date-picker" class="date-picker-box" placeholder="날짜 선택"> 
        </div>
    </div>

    <div class="tab-container">
        <div class="tab active" onclick="switchTab('trends', this)">📈 일간 전체 그래프</div>
        <div class="tab" onclick="switchTab('ranking', this)">🏆 일일 유저 랭킹</div>
        <div class="tab" onclick="switchTab('search', this)">🔍 유저 검색</div>
    </div>

    <div id="status-text" class="status-msg">데이터 로딩 중...</div>

    <div id="section-trends" class="content-section active">
        <div class="metrics-grid">
            <div class="metric-item"><div class="metric-label">📝 선택 일자 총 게시글</div><div id="m-posts" class="metric-value">0</div></div>
            <div class="metric-item"><div class="metric-label">💬 선택 일자 총 댓글</div><div id="m-comments" class="metric-value">0</div></div>
            <div class="metric-item"><div class="metric-label">👥 활동 유저 수</div><div id="m-users" class="metric-value">0</div></div>
        </div>
        <div class="st-card">
            <h3 style="margin-top:0;">시간대별 활동 추이</h3>
            <div id="main-trend-chart" style="width: 100%; height: 400px;"></div>
        </div>
    </div>

    <div id="section-ranking" class="content-section">
        <div class="st-card">
            <div class="filter-placeholder" style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px; flex-wrap: wrap; gap: 10px;">
                <button id="ranking-star-filter" class="btn-star-filter" onclick="toggleStarFilter('ranking')" title="즐겨찾기 유저만 보기">⭐</button>
                <div style="display:flex; gap: 5px; margin-left: auto;">
                    <button id="btn-rank-total" class="btn-rank active" onclick="setRankingMode('total')">총합 순</button>
                    <button id="btn-rank-post" class="btn-rank" onclick="setRankingMode('post')">게시글 순</button>
                    <button id="btn-rank-comment" class="btn-rank" onclick="setRankingMode('comment')">댓글 순</button>
                </div>
            </div>
            
            <div class="table-responsive">
                <table>
                    <colgroup>
                        <col style="width: 60px;">
                        <col style="width: 60px;">
                        <col style="width: 20%;">
                        <col style="width: 20%;">
                        <col style="width: 10%;">
                        <col style="width: 10%;">
                        <col style="width: 10%;">
                        <col style="width: 10%;">
                    </colgroup>
                    <thead>
                        <tr>
                            <th style="text-align: center;">순위</th>
                            <th style="text-align: center;">⭐</th>
                            <th>닉네임</th>
                            <th>ID (IP)</th>
                            <th>타입</th>
                            <th>글</th>
                            <th>댓글</th>
                            <th>총합</th>
                        </tr>
                    </thead>
                    <tbody id="ranking-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="section-search" class="content-section">
        <div class="st-card">
            <div style="display:flex; gap:10px; align-items:center; margin-bottom: 20px; flex-wrap: wrap; height: 50px;">
                <button id="search-star-filter" class="btn-star-filter" onclick="toggleStarFilter('search')" title="즐겨찾기 유저만 보기">⭐</button>
                <input type="text" id="search-input" placeholder="검색할 닉네임 또는 ID 입력..." style="flex: 1; box-sizing: border-box; margin:0; min-width: 200px;">
                <div style="display:flex; gap:5px;">
                    <button id="btn-type-gonic" class="btn-type gonic active" onclick="toggleSearchType('고닉')">고닉</button>
                    <button id="btn-type-ban" class="btn-type ban active" onclick="toggleSearchType('반고닉')">반고닉</button>
                    <button id="btn-type-udong" class="btn-type udong active" onclick="toggleSearchType('유동')">유동</button>
                </div>
                <button class="btn-search" onclick="executeSearch()">검색</button>
            </div>
            
            <div class="table-responsive">
                <table>
                    <colgroup>
                        <col style="width: 60px;">
                        <col style="width: 22%;">
                        <col style="width: 22%;">
                        <col style="width: 12%;">
                        <col style="width: 11%;">
                        <col style="width: 11%;">
                        <col style="width: 12%;">
                    </colgroup>
                    <thead>
                        <tr>
                            <th class="sortable" style="text-align: center;" onclick="handleHeaderSort('search', 'bookmark')">⭐<span id="sort-search-bookmark"></span></th>
                            <th class="sortable" onclick="handleHeaderSort('search', 'nickname')">닉네임<span id="sort-search-nickname"></span></th>
                            <th class="sortable" onclick="handleHeaderSort('search', 'id')">ID (IP)<span id="sort-search-id"></span></th>
                            <th class="sortable" onclick="handleHeaderSort('search', 'type')">타입<span id="sort-search-type"></span></th>
                            <th class="sortable" onclick="handleHeaderSort('search', 'post')">글<span id="sort-search-post"></span></th>
                            <th class="sortable" onclick="handleHeaderSort('search', 'comment')">댓글<span id="sort-search-comment"></span></th>
                            <th class="sortable" onclick="handleHeaderSort('search', 'total')">총합<span id="sort-search-total">▼</span></th>
                        </tr>
                    </thead>
                    <tbody id="search-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="graph-modal" class="modal">
    <div class="modal-content">
        <span style="cursor:pointer; float:right; font-size:24px;" onclick="closeModal()">&times;</span>
        <h3 id="modal-title" style="margin-top:0; margin-bottom: 20px;">유저 활동 분석</h3>
        <div id="chart-container"></div>
    </div>
</div>

<script>
    // ========================================================
    // 💡 R2 주소를 반드시 본인의 주소로 변경하세요!
    const R2_DOMAIN = "https://pub-fca2435a027e41bf954b4bc4f46e560a.r2.dev"; 
    // ========================================================

    const PROJECT_START_DATE = "2026-06-07"; 

    let currentData = [];
    let bookmarks = JSON.parse(localStorage.getItem('user_bookmarks')) || [];
    let activeTab = 'trends';
    
    let dailyTrendData = null;
    let hourlyRawData = [];

    let currentRankingMode = 'total'; 

    let sortStates = {
        search: { key: 'total', order: 'desc' }
    };

    let filterOnlyBookmarks = { ranking: false, search: false };
    let searchTypes = { '고닉': true, '반고닉': true, '유동': true };

    const todayKst = new Date(new Date().getTime() + (9 * 60 * 60 * 1000)).toISOString().split('T')[0];

    flatpickr("#date-picker", {
        locale: "ko",
        defaultDate: todayKst,
        minDate: PROJECT_START_DATE,
        maxDate: "today",
        disableMobile: true,
        onChange: function(selectedDates, dateStr, instance) {
            fetchDailyData(dateStr);
        }
    });

    function switchTab(tabId, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        
        el.classList.add('active');
        document.getElementById(`section-${tabId}`).classList.add('active');
        activeTab = tabId;
        
        if (tabId === 'trends' && dailyTrendData) renderTrendChart();
    }

    async function fetchDailyData(dateStr) {
        const statusText = document.getElementById('status-text');
        statusText.innerText = `⏳ ${dateStr} 하루치 데이터를 합산 중입니다...`;
        
        const promises = Array.from({length: 24}, (_, i) => {
            const hh = String(i).padStart(2, '0');
            const url = `${R2_DOMAIN}/${dateStr}/${hh}h.json`;
            return fetch(url, { cache: "no-store" }).then(r => r.ok ? r.json() : null).catch(() => null);
        });

        const results = await Promise.all(promises);
        hourlyRawData = results;
        
        let lastValidIndex = -1;
        for(let i = 23; i >= 0; i--) {
            if(results[i] !== null) {
                lastValidIndex = i;
                break;
            }
        }

        const trendPosts = [];
        const trendComments = [];
        const trendUsers = [];
        const xAxisLabels = [];
        const userMap = new Map();

        for (let i = 0; i <= lastValidIndex; i++) {
            const data = results[i];
            xAxisLabels.push(`${i}시`);
            
            if (data && data.length > 0) {
                let hourPosts = 0;
                let hourComments = 0;
                
                data.forEach(u => {
                    hourPosts += u.post;
                    hourComments += u.comment;
                    
                    if (userMap.has(u.id)) {
                        const existing = userMap.get(u.id);
                        existing.post += u.post;
                        existing.comment += u.comment;
                        existing.total += u.total;
                    } else {
                        userMap.set(u.id, { ...u });
                    }
                });
                
                trendPosts.push(hourPosts);
                trendComments.push(hourComments);
                trendUsers.push(data.length);
            } else {
                trendPosts.push(0);
                trendComments.push(0);
                trendUsers.push(0);
            }
        }

        dailyTrendData = { labels: xAxisLabels, posts: trendPosts, comments: trendComments, users: trendUsers };
        currentData = Array.from(userMap.values());

        if (currentData.length === 0) {
            statusText.innerText = `❌ ${dateStr} 에는 수집된 데이터가 전혀 없습니다.`;
            statusText.style.color = "red";
            updateMetrics(true);
            renderRankingTable([]);
            renderSearchTable([]);
            if (activeTab === 'trends') renderTrendChart();
            return;
        }

        updateMetrics(false);
        sortAndRenderRanking();
        executeSearch(); 
        if (activeTab === 'trends') renderTrendChart();

        statusText.innerText = `📢 실시간 데이터 반영엔 시간이 걸립니다.`;
        statusText.style.color = "#555";
    }

    function renderTrendChart() {
        if (!dailyTrendData || dailyTrendData.labels.length === 0) return;
        const chartDom = document.getElementById('main-trend-chart');
        const myChart = echarts.init(chartDom);
        
        const option = {
            tooltip: { trigger: 'axis' },
            legend: { data: ['활동 유저 수', '총 게시글', '총 댓글'], top: '0%' },
            grid: { left: '3%', right: '4%', bottom: '5%', containLabel: true },
            xAxis: { type: 'category', boundaryGap: false, data: dailyTrendData.labels },
            yAxis: { type: 'value' },
            series: [
                { name: '활동 유저 수', type: 'line', smooth: true, data: dailyTrendData.users, itemStyle: { color: '#28a745' }, areaStyle: { opacity: 0.1 } },
                { name: '총 게시글', type: 'line', smooth: true, data: dailyTrendData.posts, itemStyle: { color: '#007bff' }, areaStyle: { opacity: 0.1 } },
                { name: '총 댓글', type: 'line', smooth: true, data: dailyTrendData.comments, itemStyle: { color: '#ff4b4b' }, areaStyle: { opacity: 0.1 } }
            ]
        };
        myChart.setOption(option);
    }

    function updateMetrics(isEmpty) {
        if (isEmpty) {
            document.getElementById('m-posts').innerText = '0';
            document.getElementById('m-comments').innerText = '0';
            document.getElementById('m-users').innerText = '0';
            return;
        }
        const posts = currentData.reduce((sum, r) => sum + r.post, 0);
        const comments = currentData.reduce((sum, r) => sum + r.comment, 0);
        document.getElementById('m-posts').innerText = posts.toLocaleString();
        document.getElementById('m-comments').innerText = comments.toLocaleString();
        document.getElementById('m-users').innerText = currentData.length.toLocaleString();
    }

    function setRankingMode(mode) {
        currentRankingMode = mode;
        document.querySelectorAll('.btn-rank').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-rank-${mode}`).classList.add('active');
        sortAndRenderRanking();
    }

    function toggleStarFilter(tab) {
        filterOnlyBookmarks[tab] = !filterOnlyBookmarks[tab];
        const btn = document.getElementById(`${tab}-star-filter`);
        
        if (filterOnlyBookmarks[tab]) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
        
        if (tab === 'ranking') sortAndRenderRanking();
        if (tab === 'search') executeSearch();
    }

    function toggleSearchType(type) {
        searchTypes[type] = !searchTypes[type]; 
        let btnId = type === '고닉' ? 'btn-type-gonic' : (type === '반고닉' ? 'btn-type-ban' : 'btn-type-udong');
        const btn = document.getElementById(btnId);
        
        if (searchTypes[type]) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    }

    function handleHeaderSort(tab, key) {
        if (tab !== 'search') return; 
        if (sortStates.search.key === key) {
            sortStates.search.order = sortStates.search.order === 'desc' ? 'asc' : 'desc';
        } else {
            sortStates.search.key = key;
            sortStates.search.order = 'desc';
        }
        updateSortIndicators('search');
        executeSearch();
    }

    function updateSortIndicators(tab) {
        if (tab !== 'search') return;
        const columns = ['bookmark', 'nickname', 'id', 'type', 'post', 'comment', 'total'];
        columns.forEach(col => {
            const span = document.getElementById(`sort-search-${col}`);
            if (span) {
                if (sortStates.search.key === col) {
                    span.innerText = sortStates.search.order === 'desc' ? '▼' : '▲';
                } else {
                    span.innerText = '';
                }
            }
        });
    }

    function sortData(data, key, order) {
        return data.sort((a, b) => {
            let valA, valB;
            if (key === 'bookmark') {
                valA = bookmarks.includes(a.id) ? 1 : 0;
                valB = bookmarks.includes(b.id) ? 1 : 0;
            } else {
                valA = a[key];
                valB = b[key];
            }

            if (typeof valA === 'string') {
                return order === 'asc' ? valA.localeCompare(valB, 'ko') : valB.localeCompare(valA, 'ko');
            } else {
                return order === 'asc' ? valA - valB : valB - valA;
            }
        });
    }

    function sortAndRenderRanking() {
        let displayData = [...currentData];
        displayData.sort((a, b) => b[currentRankingMode] - a[currentRankingMode]);
        displayData.forEach((u, index) => { u.rank = index + 1; });
        
        if (filterOnlyBookmarks.ranking) {
            displayData = displayData.filter(r => bookmarks.includes(r.id));
        }
        displayData = displayData.slice(0, 50);

        const bookmarkedUsers = displayData.filter(r => bookmarks.includes(r.id));
        const normalUsers = displayData.filter(r => !bookmarks.includes(r.id));
        renderRankingTable([...bookmarkedUsers, ...normalUsers]);
    }

    function executeSearch() {
        const kw = document.getElementById('search-input').value.toLowerCase();
        let filtered = [...currentData];
        
        if (kw) {
            filtered = filtered.filter(r => r.nickname.toLowerCase().includes(kw) || r.id.toLowerCase().includes(kw));
        }
        filtered = filtered.filter(r => searchTypes[r.type]);
        if (filterOnlyBookmarks.search) {
            filtered = filtered.filter(r => bookmarks.includes(r.id));
        }
        
        filtered = sortData(filtered, sortStates.search.key, sortStates.search.order);

        const bookmarkedUsers = filtered.filter(r => bookmarks.includes(r.id));
        const normalUsers = filtered.filter(r => !bookmarks.includes(r.id));
        renderSearchTable([...bookmarkedUsers, ...normalUsers]);
    }

    function renderRankingTable(data) {
        const tbody = document.getElementById('ranking-body');
        tbody.innerHTML = '';
        data.forEach(row => {
            const isBookmarked = bookmarks.includes(row.id);
            const tr = document.createElement('tr');
            if (isBookmarked) tr.style.background = "#fffacd"; 
            
            tr.onclick = () => openModal(row.nickname, row.id);
            let bType = (row.type === "고닉") ? "bg-gonic" : (row.type === "반고닉" ? "bg-ban" : "bg-udong");
            
            const postWeight = currentRankingMode === 'post' ? 'font-weight:bold;' : '';
            const commentWeight = currentRankingMode === 'comment' ? 'font-weight:bold;' : '';
            const totalWeight = currentRankingMode === 'total' ? 'font-weight:bold;' : '';

            tr.innerHTML = `
                <td class="rank-number">${row.rank}위</td>
                <td class="td-bookmark" onclick="event.stopPropagation(); toggleBookmark('${row.id}')" title="클릭하여 즐겨찾기">
                    <input type="checkbox" class="star-checkbox" ${isBookmarked ? 'checked' : ''}>
                </td>
                <td title="${row.nickname}">${row.nickname}</td>
                <td title="${row.id}">${row.id}</td>
                <td><span class="badge ${bType}">${row.type}</span></td>
                <td style="${postWeight}">${row.post}</td>
                <td style="${commentWeight}">${row.comment}</td>
                <td style="${totalWeight}">${row.total}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function renderSearchTable(data) {
        const tbody = document.getElementById('search-body');
        tbody.innerHTML = '';
        data.forEach(row => {
            const isBookmarked = bookmarks.includes(row.id);
            const tr = document.createElement('tr');
            if (isBookmarked) tr.style.background = "#fffacd"; 
            
            tr.onclick = () => openModal(row.nickname, row.id);
            let bType = (row.type === "고닉") ? "bg-gonic" : (row.type === "반고닉" ? "bg-ban" : "bg-udong");
            
            tr.innerHTML = `
                <td class="td-bookmark" onclick="event.stopPropagation(); toggleBookmark('${row.id}')" title="클릭하여 즐겨찾기">
                    <input type="checkbox" class="star-checkbox" ${isBookmarked ? 'checked' : ''}>
                </td>
                <td title="${row.nickname}">${row.nickname}</td>
                <td title="${row.id}">${row.id}</td>
                <td><span class="badge ${bType}">${row.type}</span></td>
                <td>${row.post}</td>
                <td>${row.comment}</td>
                <td>${row.total}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    let modalChart = null;
    function openModal(nick, id) {
        document.getElementById('graph-modal').style.display = "block";
        document.getElementById('modal-title').innerText = `${nick} (${id}) 활동 상세`;
        
        let lastValidIndex = -1;
        for(let i = 23; i >= 0; i--) {
            if(hourlyRawData[i] !== null) {
                lastValidIndex = i;
                break;
            }
        }
        
        const validLen = lastValidIndex >= 0 ? lastValidIndex + 1 : 0;
        const hours = Array.from({length: validLen}, (_, i) => `${i}시`);
        const userPosts = [];
        const userComments = [];

        for(let i = 0; i < validLen; i++) {
            const hourData = hourlyRawData[i];
            if (hourData && hourData.length > 0) {
                const userRecord = hourData.find(u => u.id === id);
                if (userRecord) {
                    userPosts.push(userRecord.post);
                    userComments.push(userRecord.comment);
                } else {
                    userPosts.push(0);
                    userComments.push(0);
                }
            } else {
                userPosts.push(0);
                userComments.push(0);
            }
        }

        if (modalChart) modalChart.dispose();
        modalChart = echarts.init(document.getElementById('chart-container'));
        
        modalChart.setOption({
            tooltip: { trigger: 'axis' },
            legend: { data: ['게시글', '댓글'], top: '0%' },
            grid: { left: '3%', right: '4%', bottom: '5%', containLabel: true },
            xAxis: { type: 'category', boundaryGap: false, data: hours },
            yAxis: { type: 'value' },
            series: [
                { name: '게시글', type: 'line', smooth: true, data: userPosts, itemStyle: { color: '#007bff' }, areaStyle: { opacity: 0.1 } },
                { name: '댓글', type: 'line', smooth: true, data: userComments, itemStyle: { color: '#ff4b4b' }, areaStyle: { opacity: 0.1 } }
            ]
        });
    }

    function toggleBookmark(id) {
        bookmarks = bookmarks.includes(id) ? bookmarks.filter(b => b !== id) : [...bookmarks, id];
        localStorage.setItem('user_bookmarks', JSON.stringify(bookmarks));
        sortAndRenderRanking();
        executeSearch();
    }

    function closeModal() { document.getElementById('graph-modal').style.display = "none"; }
    
    window.onload = () => fetchDailyData(todayKst);
</script>

</body>
</html>
